<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Weather App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      transition: background 0.6s ease;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .container {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 22px;
      padding: 30px 22px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.2);
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 22px;
    }

    .search-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: none;
      outline: none;
      border-radius: 12px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.92);
      color: #333;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 140px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: white;
      color: #0077b6;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      background: #eef8ff;
    }

    #weather {
      margin-top: 24px;
      min-height: 80px;
    }

    .weather-card {
      animation: fadeIn 0.5s ease;
    }

    #weather img {
      width: 90px;
      height: 90px;
      margin: 8px 0;
    }

    .city-name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .temp {
      font-size: 42px;
      font-weight: bold;
      margin: 10px 0;
    }

    .description {
      font-size: 18px;
      text-transform: capitalize;
      margin-bottom: 18px;
    }

    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .detail-box {
      background: rgba(255, 255, 255, 0.18);
      padding: 14px;
      border-radius: 14px;
    }

    .detail-box h3 {
      font-size: 13px;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .detail-box p {
      font-size: 17px;
      font-weight: bold;
    }

    .loading,
    .error {
      margin-top: 15px;
      font-size: 16px;
      font-weight: bold;
    }

    .error {
      color: #ffe3e3;
    }

    .loading::after {
      content: "";
      display: inline-block;
      width: 18px;
      text-align: left;
      animation: dots 1.2s infinite;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes dots {
      0% { content: ""; }
      33% { content: "."; }
      66% { content: ".."; }
      100% { content: "..."; }
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px 18px;
      }

      h1 {
        font-size: 25px;
      }

      .temp {
        font-size: 36px;
      }

      button {
        min-width: 100%;
      }

      .details {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Weather App</h1>
    <p class="subtitle">Check current weather anywhere in the world</p>

    <div class="search-box">
      <input id="city" type="text" placeholder="Enter city name">

      <div class="buttons">
        <button id="submit">Get Weather</button>
        <button id="locationBtn">Use My Location</button>
      </div>
    </div>

    <div id="weather"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
